name: Feature Pipeline

on:
  schedule:
    # Run at minute 7 of every hour (avoiding minute-0 stampede)
    - cron: '7 * * * *'
  workflow_dispatch:  # Manual trigger for debugging

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: feature-pipeline
  cancel-in-progress: false

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feature pipeline
        run: python src/feature_pipeline/runner.py
        env:
          HOPWORKS_API_KEY: ${{ secrets.HOPWORKS_API_KEY }}
          HOPWORKS_PROJECT_NAME: ${{ secrets.HOPWORKS_PROJECT_NAME }}
          AQICN_API_TOKEN: ${{ secrets.AQICN_API_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          CITIES: ${{ vars.CITIES }}
